<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书馆智能服务系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-icon {
            font-size: 36px;
        }

        .header-text h1 {
            font-size: 22px;
            font-weight: 600;
        }

        .header-text p {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 3px;
        }

        .sidebar-btn {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }

        .sidebar-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: #f8f9fa;
            border-right: 1px solid #e9ecef;
            padding: 20px;
            overflow-y: auto;
            transition: transform 0.3s;
        }

        .sidebar.hidden {
            display: none;
        }

        .sidebar h3 {
            color: #495057;
            font-size: 14px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }

        .quick-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 25px;
        }

        .quick-btn {
            background: white;
            border: 1px solid #dee2e6;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 13px;
            color: #495057;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateX(3px);
        }

        .feature-list {
            list-style: none;
        }

        .feature-list li {
            padding: 8px 0;
            font-size: 13px;
            color: #6c757d;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feature-icon {
            width: 24px;
            height: 24px;
            background: #e7f3ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.bot .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.bot .bubble {
            background: #f1f3f5;
            color: #212529;
            border-bottom-left-radius: 4px;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .input-area {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            background: white;
            border-radius: 25px;
            padding: 8px 8px 8px 20px;
            border: 2px solid #e9ecef;
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: #667eea;
        }

        #user-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            padding: 8px 0;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .typing {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #adb5bd;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
        }

        .welcome-card {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border: 1px solid #667eea30;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 10px;
        }

        .welcome-card h2 {
            color: #495057;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .welcome-card p {
            color: #6c757d;
            font-size: 13px;
            line-height: 1.6;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .quick-reply {
            background: white;
            border: 1px solid #667eea40;
            color: #667eea;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .quick-reply:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }

            .sidebar {
                position: absolute;
                z-index: 100;
                height: 100%;
                transform: translateX(-100%);
            }

            .sidebar.show {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">📚</div>
            <div class="header-text">
                <h1>图书馆智能服务系统</h1>
                <p>你的专属学习伙伴</p>
            </div>
            <button class="sidebar-btn" onclick="toggleSidebar()">☰ 菜单</button>
        </div>

        <div class="main-content">
            <div class="sidebar" id="sidebar">
                <h3>📚 图书馆服务</h3>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="sendQuickMessage('我是考研学生')">🎓 考研学生</button>
                    <button class="quick-btn" onclick="sendQuickMessage('我是留学生')">🌍 留学生</button>
                    <button class="quick-btn" onclick="sendQuickMessage('我是焦虑学生')">💚 焦虑学生</button>
                    <button class="quick-btn" onclick="sendQuickMessage('推荐一些资料')">📚 获取推荐</button>
                    <button class="quick-btn" onclick="sendQuickMessage('帮我预约座位')">🪑 预约座位</button>
                    <button class="quick-btn" onclick="sendQuickMessage('查看座位分布')">📊 座位统计</button>
                </div>

                <h3>🧠 AI学习助手</h3>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="sendQuickMessage('求x² + 2x + 1 = 0的解')">📐 数学解题</button>
                    <button class="quick-btn" onclick="sendQuickMessage('用Python实现快速排序')">💻 编程解答</button>
                    <button class="quick-btn" onclick="sendQuickMessage('翻译Hello World')">🌐 翻译服务</button>
                    <button class="quick-btn" onclick="sendQuickMessage('写一篇关于人工智能的作文')">✍️ 作文写作</button>
                    <button class="quick-btn" onclick="sendQuickMessage('什么是量子计算')">❓ 知识问答</button>
                </div>

                <h3>✨ 功能特性</h3>
                <ul class="feature-list">
                    <li><span class="feature-icon">🎯</span> 情境感知推荐</li>
                    <li><span class="feature-icon">⚖️</span> 公平性保障</li>
                    <li><span class="feature-icon">🌈</span> 多样性推荐</li>
                    <li><span class="feature-icon">❤️</span> 人文关怀设计</li>
                    <li><span class="feature-icon">🧠</span> AI解题能力</li>
                    <li><span class="feature-icon">🔍</span> 智能搜索</li>
                </ul>
            </div>

            <div class="chat-area">
                <div class="messages" id="messages">
                    <div class="message bot">
                        <div class="avatar">🤖</div>
                        <div class="bubble">
                            <div class="welcome-card">
                                <h2>👋 欢迎使用图书馆智能服务系统</h2>
                                <p>我是你的专属智能助手，不仅可以帮你查找书籍、预约座位，还具备AI学习解题能力！</p>
                                <div class="quick-replies">
                                    <span class="quick-reply" onclick="sendQuickMessage('我是考研学生')">🎓 考研学生</span>
                                    <span class="quick-reply" onclick="sendQuickMessage('推荐一些资料')">📚 推荐资料</span>
                                    <span class="quick-reply" onclick="sendQuickMessage('帮我找座位')">🪑 找座位</span>
                                    <span class="quick-reply" onclick="sendQuickMessage('求x² + 2x + 1 = 0的解')">🧠 数学解题</span>
                                    <span class="quick-reply" onclick="sendQuickMessage('用Python实现快速排序')">💻 编程解答</span>
                                    <span class="quick-reply" onclick="sendQuickMessage('帮助')">❓ 帮助</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea 
                            id="user-input" 
                            placeholder="输入消息... (Enter发送，Shift+Enter换行)"
                            rows="1"
                        ></textarea>
                        <button class="send-btn" id="send-btn" onclick="sendMessage()">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sidebar = document.getElementById('sidebar');

        function toggleSidebar() {
            sidebar.classList.toggle('hidden');
        }

        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = isUser ? '👤' : '🤖';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            messagesContainer.appendChild(messageDiv);
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="bubble typing">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;
            
            addTypingIndicator();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                
                removeTypingIndicator();
                
                if (data.response) {
                    addMessage(data.response, false);
                }
                
            } catch (error) {
                removeTypingIndicator();
                addMessage('抱歉，网络连接出错，请稍后重试。', false);
            }
            
            sendBtn.disabled = false;
            userInput.focus();
        }

        function sendQuickMessage(text) {
            userInput.value = text;
            sendMessage();
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
        });

        userInput.focus();
    </script>
</body>
</html>
