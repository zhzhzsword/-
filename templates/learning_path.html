<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习路径 - 图书馆智能服务系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 220px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-logo {
            padding: 0 20px 20px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .sidebar-menu {
            list-style: none;
            margin-top: 20px;
        }
        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }
        .sidebar-menu li a:hover,
        .sidebar-menu li a.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .main-content {
            flex: 1;
            margin-left: 220px;
            padding: 30px;
        }
        .page-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-header h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .page-header p {
            color: #7f8c8d;
            font-size: 14px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .btn-success {
            background: #52c41a;
            color: white;
        }
        .path-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .path-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.3s;
        }
        .path-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        .path-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .path-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }
        .path-type {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            background: #e7f3ff;
            color: #1890ff;
        }
        .path-desc {
            color: #7f8c8d;
            font-size: 13px;
            margin-bottom: 16px;
            line-height: 1.6;
        }
        .path-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #666;
        }
        .path-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .progress-bar {
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.5s;
        }
        .progress-text {
            font-size: 12px;
            color: #7f8c8d;
            display: flex;
            justify-content: space-between;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .days-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .day-section {
            border-left: 3px solid #667eea;
            padding-left: 15px;
        }
        .day-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .task-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .task-item.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }
        .task-info h4 {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
        }
        .task-info p {
            font-size: 12px;
            color: #7f8c8d;
        }
        .task-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            flex-shrink: 0;
        }
        .task-status.completed { background: #e8f8f0; color: #52c41a; }
        .task-status.in-progress { background: #e7f3ff; color: #1890ff; }
        .task-status.pending { background: #fff4e6; color: #fa8c16; }
        .create-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo">📚 图书馆智能服务</div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard">📊 学习仪表盘</a></li>
                <li><a href="/learning-path" class="active">🎯 学习路径</a></li>
                <li><a href="/reading-group">📖 共读小组</a></li>
                <li><a href="/pomodoro">🍅 番茄钟</a></li>
                <li><a href="/">💬 智能助手</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>学习路径</h1>
                    <p>规划学习计划，按部就班达成目标</p>
                </div>
                <button class="btn btn-primary" onclick="showCreateModal()">+ 新建路径</button>
            </div>
            
            <div class="path-list" id="pathList"></div>
        </main>
    </div>
    
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">学习路径详情</h2>
                <button class="close-btn" onclick="closeModal('detailModal')">&times;</button>
            </div>
            <div id="pathDetail"></div>
        </div>
    </div>
    
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">新建学习路径</h2>
                <button class="close-btn" onclick="closeModal('createModal')">&times;</button>
            </div>
            <div class="create-form">
                <div class="form-group">
                    <label>选择学习路径类型</label>
                    <select id="pathType">
                        <option value="考研数学">考研数学14天冲刺</option>
                        <option value="雅思备考">雅思10天冲刺计划</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="createPath()">生成学习路径</button>
            </div>
        </div>
    </div>
    
    <script>
        let paths = [];
        
        async function loadPaths() {
            try {
                const response = await fetch('/api/learning-paths');
                const data = await response.json();
                paths = data.paths;
                renderPaths();
            } catch (error) {
                console.error('加载学习路径失败:', error);
            }
        }
        
        function renderPaths() {
            const list = document.getElementById('pathList');
            
            if (paths.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <h3>还没有学习路径</h3>
                        <p>点击右上角按钮创建你的第一条学习路径</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = paths.map(path => `
                <div class="path-card" onclick="showDetail('${path.path_id}')">
                    <div class="path-header">
                        <div class="path-title">${path.title}</div>
                        <div class="path-type">${path.path_type}</div>
                    </div>
                    <div class="path-desc">${path.description}</div>
                    <div class="path-meta">
                        <span>📅 ${path.total_days}天</span>
                        <span>📝 ${path.completed_tasks}/${path.total_tasks}任务</span>
                        <span>${path.status}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${path.progress}%"></div>
                    </div>
                    <div class="progress-text">
                        <span>进度</span>
                        <span>${path.progress}%</span>
                    </div>
                </div>
            `).join('');
        }
        
        async function showDetail(pathId) {
            try {
                const response = await fetch(`/api/learning-paths/${pathId}/tasks`);
                const data = await response.json();
                
                document.getElementById('modalTitle').textContent = data.title;
                document.getElementById('pathDetail').innerHTML = renderDetailContent(data);
                document.getElementById('detailModal').classList.add('show');
            } catch (error) {
                console.error('加载路径详情失败:', error);
            }
        }
        
        function renderDetailContent(data) {
            let html = `
                <div style="margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span style="color: #666;">当前进度</span>
                        <span style="font-weight: 600; color: #667eea;">${data.progress}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${data.progress}%"></div>
                    </div>
                    <div style="font-size: 12px; color: #999; margin-top: 8px;">
                        第 ${data.current_day} 天 / 共 ${Object.keys(data.tasks_by_day).length} 天
                    </div>
                </div>
                <div class="days-container">
            `;
            
            for (const [day, tasks] of Object.entries(data.tasks_by_day).sort((a,b) => a[0]-b[0])) {
                const isCurrentDay = parseInt(day) === data.current_day;
                html += `
                    <div class="day-section">
                        <div class="day-title">
                            <span class="day-badge">${day}</span>
                            第${day}天
                            ${isCurrentDay ? '<span style="font-size: 12px; color: #52c41a; background: #e8f8f0; padding: 2px 8px; border-radius: 8px;">进行中</span>' : ''}
                        </div>
                        ${tasks.map(task => `
                            <div class="task-item ${task.status === '已完成' ? 'completed' : ''}">
                                <div class="task-info">
                                    <h4>${task.title}</h4>
                                    <p>${task.description}</p>
                                </div>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span class="task-status ${task.status === '已完成' ? 'completed' : task.status === '进行中' ? 'in-progress' : 'pending'}">${task.status}</span>
                                    ${task.status !== '已完成' ? `<button class="btn btn-success" style="padding: 4px 12px; font-size: 12px;" onclick="completeTask('${data.path_id}', '${task.task_id}')">完成</button>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            html += '</div>';
            return html;
        }
        
        async function completeTask(pathId, taskId) {
            event.stopPropagation();
            try {
                const response = await fetch(`/api/learning-paths/${pathId}/tasks/${taskId}/complete`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    loadPaths();
                    showDetail(pathId);
                }
            } catch (error) {
                console.error('完成任务失败:', error);
            }
        }
        
        function showCreateModal() {
            document.getElementById('createModal').classList.add('show');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }
        
        async function createPath() {
            const pathType = document.getElementById('pathType').value;
            try {
                const response = await fetch('/api/learning-paths/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path_type: pathType })
                });
                const data = await response.json();
                
                closeModal('createModal');
                loadPaths();
            } catch (error) {
                console.error('创建路径失败:', error);
            }
        }
        
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('show');
                }
            });
        });
        
        loadPaths();
    </script>
</body>
</html>
