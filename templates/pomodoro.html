<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟 - 图书馆智能服务系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-logo {
            padding: 0 20px 20px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .sidebar-menu { list-style: none; margin-top: 20px; }
        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }
        .sidebar-menu li a:hover,
        .sidebar-menu li a.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .main-content {
            flex: 1;
            margin-left: 220px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-header h1 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        .page-header p {
            color: #7f8c8d;
            font-size: 14px;
        }
        .pomodoro-container {
            background: white;
            border-radius: 24px;
            padding: 50px 60px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            text-align: center;
            margin-bottom: 30px;
        }
        .timer-display {
            font-size: 100px;
            font-weight: 200;
            color: #2c3e50;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 4px;
        }
        .timer-status {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
        }
        .timer-status.focus { color: #ff6b6b; }
        .timer-status.break { color: #52c41a; }
        .timer-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .btn {
            padding: 14px 36px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        .btn-secondary:hover {
            background: #eee;
        }
        .btn-danger {
            background: #ff6b6b;
            color: white;
        }
        .btn-danger:hover {
            background: #ff5252;
        }
        .time-presets {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .preset-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }
        .preset-btn:hover,
        .preset-btn.active {
            border-color: #667eea;
            color: #667eea;
            background: #f0f3ff;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
        }
        .stat-item {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 16px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 13px;
            color: #999;
        }
        .session-history {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 500px;
        }
        .session-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .session-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .session-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 13px;
        }
        .session-type {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .session-type.focus { color: #ff6b6b; }
        .session-type.break { color: #52c41a; }
        .session-time { color: #999; }
        .progress-ring {
            transform: rotate(-90deg);
            margin-bottom: 20px;
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 1s linear;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo">📚 图书馆智能服务</div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard">📊 学习仪表盘</a></li>
                <li><a href="/learning-path">🎯 学习路径</a></li>
                <li><a href="/reading-group">📖 共读小组</a></li>
                <li><a href="/pomodoro" class="active">🍅 番茄钟</a></li>
                <li><a href="/">💬 智能助手</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <h1>🍅 番茄工作法</h1>
                <p>25分钟专注，5分钟休息，高效学习</p>
            </div>
            
            <div class="pomodoro-container">
                <svg class="progress-ring" width="280" height="280">
                    <circle
                        class="progress-ring-bg"
                        stroke="#f0f0f0"
                        stroke-width="10"
                        fill="transparent"
                        r="125"
                        cx="140"
                        cy="140"
                    />
                    <circle
                        class="progress-ring-circle"
                        stroke="url(#gradient)"
                        stroke-width="10"
                        stroke-linecap="round"
                        fill="transparent"
                        r="125"
                        cx="140"
                        cy="140"
                        stroke-dasharray="785"
                        stroke-dashoffset="0"
                        id="progressCircle"
                    />
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#667eea" />
                            <stop offset="100%" stop-color="#764ba2" />
                        </linearGradient>
                    </defs>
                </svg>
                
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-status" id="timerStatus">准备开始</div>
                
                <div class="time-presets">
                    <button class="preset-btn active" onclick="setTime(25, 5)">25+5</button>
                    <button class="preset-btn" onclick="setTime(30, 5)">30+5</button>
                    <button class="preset-btn" onclick="setTime(45, 10)">45+10</button>
                    <button class="preset-btn" onclick="setTime(50, 10)">50+10</button>
                </div>
                
                <div class="timer-controls">
                    <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">开始专注</button>
                    <button class="btn btn-secondary" onclick="resetTimer()">重置</button>
                </div>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-value" id="completedPomodoros">0</div>
                        <div class="stat-label">完成番茄</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalMinutes">0</div>
                        <div class="stat-label">专注分钟</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="currentCycle">0</div>
                        <div class="stat-label">当前轮次</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let workMinutes = 25;
        let breakMinutes = 5;
        let currentSeconds = workMinutes * 60;
        let timerInterval = null;
        let isRunning = false;
        let isBreak = false;
        let completedPomodoros = 0;
        let totalMinutes = 0;
        let currentCycle = 0;
        let sessionId = null;
        
        const timerDisplay = document.getElementById('timerDisplay');
        const timerStatus = document.getElementById('timerStatus');
        const startBtn = document.getElementById('startBtn');
        const progressCircle = document.getElementById('progressCircle');
        const circumference = 2 * Math.PI * 125;
        
        function updateDisplay() {
            const minutes = Math.floor(currentSeconds / 60);
            const seconds = currentSeconds % 60;
            timerDisplay.textContent = 
                String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
            
            const totalSeconds = isBreak ? breakMinutes * 60 : workMinutes * 60;
            const progress = currentSeconds / totalSeconds;
            const offset = circumference * (1 - progress);
            progressCircle.style.strokeDashoffset = offset;
        }
        
        function updateStatus() {
            if (!isRunning) {
                timerStatus.textContent = '准备开始';
                timerStatus.className = 'timer-status';
            } else if (isBreak) {
                timerStatus.textContent = '☕ 休息中';
                timerStatus.className = 'timer-status break';
            } else {
                timerStatus.textContent = '🍅 专注中';
                timerStatus.className = 'timer-status focus';
            }
        }
        
        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }
        
        async function startTimer() {
            if (!isRunning) {
                if (currentSeconds === workMinutes * 60 && !isBreak) {
                    try {
                        const response = await fetch('/api/pomodoro/start', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ work_minutes: workMinutes, break_minutes: breakMinutes })
                        });
                        const data = await response.json();
                        sessionId = data.session_id;
                    } catch (e) {}
                }
                
                isRunning = true;
                startBtn.textContent = '暂停';
                startBtn.className = 'btn btn-danger';
                updateStatus();
                
                timerInterval = setInterval(() => {
                    currentSeconds--;
                    updateDisplay();
                    
                    if (currentSeconds <= 0) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        
                        if (!isBreak) {
                            completedPomodoros++;
                            totalMinutes += workMinutes;
                            currentCycle++;
                            document.getElementById('completedPomodoros').textContent = completedPomodoros;
                            document.getElementById('totalMinutes').textContent = totalMinutes;
                            document.getElementById('currentCycle').textContent = currentCycle;
                            
                            playNotification();
                            isBreak = true;
                            currentSeconds = breakMinutes * 60;
                            alert('🍅 专注时间结束！休息一下吧~');
                        } else {
                            playNotification();
                            isBreak = false;
                            currentSeconds = workMinutes * 60;
                            alert('☕ 休息结束！继续加油~');
                        }
                        
                        updateDisplay();
                        updateStatus();
                        startBtn.textContent = '开始';
                        startBtn.className = 'btn btn-primary';
                    }
                }, 1000);
            }
        }
        
        function pauseTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                startBtn.textContent = '继续';
                startBtn.className = 'btn btn-primary';
                updateStatus();
            }
        }
        
        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            isBreak = false;
            currentSeconds = workMinutes * 60;
            currentCycle = 0;
            
            startBtn.textContent = '开始专注';
            startBtn.className = 'btn btn-primary';
            
            document.getElementById('currentCycle').textContent = '0';
            progressCircle.style.strokeDashoffset = '0';
            
            updateDisplay();
            updateStatus();
        }
        
        function setTime(work, breakTime) {
            if (isRunning) return;
            
            workMinutes = work;
            breakMinutes = breakTime;
            currentSeconds = work * 60;
            isBreak = false;
            
            document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            updateDisplay();
            updateStatus();
        }
        
        function playNotification() {
            try {
                const audio = new AudioContext();
                const oscillator = audio.createOscillator();
                const gainNode = audio.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audio.destination);
                
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audio.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + 0.5);
                
                oscillator.start(audio.currentTime);
                oscillator.stop(audio.currentTime + 0.5);
            } catch (e) {}
        }
        
        updateDisplay();
        updateStatus();
    </script>
</body>
</html>
