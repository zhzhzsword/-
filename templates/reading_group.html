<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共读小组 - 图书馆智能服务系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-logo {
            padding: 0 20px 20px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .sidebar-menu { list-style: none; margin-top: 20px; }
        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }
        .sidebar-menu li a:hover,
        .sidebar-menu li a.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .main-content {
            flex: 1;
            margin-left: 220px;
            padding: 30px;
        }
        .page-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-header h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .page-header p {
            color: #7f8c8d;
            font-size: 14px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .btn-success { background: #52c41a; color: white; }
        .group-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .group-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.3s;
            cursor: pointer;
        }
        .group-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        .group-book {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        .group-desc {
            color: #7f8c8d;
            font-size: 13px;
            margin-bottom: 15px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .group-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }
        .group-creator {
            font-size: 12px;
            color: #999;
        }
        .group-members {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #666;
        }
        .member-avatars {
            display: flex;
        }
        .member-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: -6px;
            border: 2px solid white;
        }
        .member-avatar:first-child { margin-left: 0; }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .status-recruiting { background: #e6f7ff; color: #1890ff; }
        .status-reading { background: #f6ffed; color: #52c41a; }
        .status-completed { background: #f5f5f5; color: #999; }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .modal-title {
            font-size: 22px;
            font-weight: 600;
            color: #2c3e50;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            line-height: 1;
        }
        .modal-desc {
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 12px;
            margin-top: 20px;
        }
        .members-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 20px;
            font-size: 13px;
        }
        .member-avatar-sm {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .note-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
        }
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .note-author {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .note-time {
            font-size: 12px;
            color: #999;
        }
        .note-content {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .note-actions {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #999;
        }
        .note-like {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .note-like:hover { color: #f5576c; }
        .note-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            margin-bottom: 10px;
            font-family: inherit;
        }
        .note-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
        .create-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            padding: 10px 0;
            cursor: pointer;
            color: #666;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            font-size: 14px;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo">📚 图书馆智能服务</div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard">📊 学习仪表盘</a></li>
                <li><a href="/learning-path">🎯 学习路径</a></li>
                <li><a href="/reading-group" class="active">📖 共读小组</a></li>
                <li><a href="/pomodoro">🍅 番茄钟</a></li>
                <li><a href="/">💬 智能助手</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>共读小组</h1>
                    <p>找到志同道合的伙伴，一起读书成长</p>
                </div>
                <button class="btn btn-primary" onclick="showCreateModal()">+ 创建小组</button>
            </div>
            
            <div class="tabs">
                <div class="tab active" onclick="switchTab('all')">全部小组</div>
                <div class="tab" onclick="switchTab('my')">我加入的</div>
            </div>
            
            <div class="group-list" id="groupList"></div>
        </main>
    </div>
    
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">小组详情</h2>
                <button class="close-btn" onclick="closeModal('detailModal')">&times;</button>
            </div>
            <div id="groupDetail"></div>
        </div>
    </div>
    
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">创建共读小组</h2>
                <button class="close-btn" onclick="closeModal('createModal')">&times;</button>
            </div>
            <div class="create-form">
                <div class="form-group">
                    <label>书名</label>
                    <input type="text" id="bookTitle" placeholder="例如：《百年孤独》">
                </div>
                <div class="form-group">
                    <label>小组简介</label>
                    <textarea id="groupDesc" placeholder="介绍一下你们的共读计划..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="createGroup()">创建小组</button>
            </div>
        </div>
    </div>
    
    <script>
        let groups = [];
        let currentTab = 'all';
        
        async function loadGroups() {
            try {
                const response = await fetch('/api/reading-groups');
                const data = await response.json();
                groups = data.groups;
                renderGroups();
            } catch (error) {
                console.error('加载小组失败:', error);
            }
        }
        
        function renderGroups() {
            const list = document.getElementById('groupList');
            let filteredGroups = groups;
            
            if (currentTab === 'my') {
                filteredGroups = groups.filter(g => g.is_member);
            }
            
            if (filteredGroups.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <h3>暂无小组</h3>
                        <p>创建一个共读小组吧</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filteredGroups.map(group => {
                const statusClass = group.status === '招募中' ? 'status-recruiting' : 
                                   group.status === '进行中' ? 'status-reading' : 'status-completed';
                return `
                    <div class="group-card" onclick="showDetail('${group.group_id}')">
                        <span class="status-badge ${statusClass}">${group.status}</span>
                        <div class="group-book">${group.book_title}</div>
                        <div class="group-desc">${group.description}</div>
                        <div class="group-meta">
                            <span class="group-creator">创建者：${group.creator_name}</span>
                            <div class="group-members">
                                <span>👥 ${group.member_count}/${group.max_members}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && tab === 'all') || (i === 1 && tab === 'my'));
            });
            renderGroups();
        }
        
        async function showDetail(groupId) {
            try {
                const response = await fetch(`/api/reading-groups/${groupId}`);
                const data = await response.json();
                
                document.getElementById('modalTitle').textContent = data.book_title;
                document.getElementById('groupDetail').innerHTML = renderDetailContent(data);
                document.getElementById('detailModal').classList.add('show');
            } catch (error) {
                console.error('加载小组详情失败:', error);
            }
        }
        
        function renderDetailContent(data) {
            const isMember = data.members.some(m => m.user_name === '李明');
            
            let html = `
                <p class="modal-desc">${data.description}</p>
                <div style="display: flex; gap: 20px; font-size: 13px; color: #666; margin-bottom: 15px;">
                    <span>👥 ${data.member_count} 人</span>
                    <span>📝 ${data.notes.length} 条笔记</span>
                    <span>${data.status}</span>
                </div>
            `;
            
            if (!isMember) {
                html += `<button class="btn btn-primary" onclick="joinGroup('${data.group_id}')">+ 加入小组</button>`;
            }
            
            html += `
                <div class="section-title">👥 小组成员</div>
                <div class="members-list">
                    ${data.members.map(m => `
                        <div class="member-item">
                            <div class="member-avatar-sm">${m.user_name.charAt(0)}</div>
                            <span>${m.user_name}</span>
                            ${m.role === 'creator' ? '<span style="color: #fa8c16; font-size: 11px;">创建者</span>' : ''}
                        </div>
                    `).join('')}
                </div>
            `;
            
            if (isMember) {
                html += `
                    <div class="section-title">✍️ 写读书笔记</div>
                    <textarea class="note-input" id="noteInput" placeholder="分享你的读书感悟..."></textarea>
                    <button class="btn btn-success" onclick="addNote('${data.group_id}')">发布笔记</button>
                `;
            }
            
            html += `
                <div class="section-title">📝 读书笔记 (${data.notes.length})</div>
                <div class="notes-list">
            `;
            
            if (data.notes.length === 0) {
                html += `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>还没有笔记，来写第一条吧</p>
                    </div>
                `;
            } else {
                html += data.notes.map(note => `
                    <div class="note-item">
                        <div class="note-header">
                            <span class="note-author">${note.user_name}</span>
                            <span class="note-time">${note.created_at}</span>
                        </div>
                        <div class="note-content">${note.content}</div>
                        <div class="note-actions">
                            <span class="note-like" onclick="likeNote('${data.group_id}', '${note.note_id}')">👍 ${note.likes}</span>
                        </div>
                    </div>
                `).join('');
            }
            
            html += '</div>';
            return html;
        }
        
        async function joinGroup(groupId) {
            try {
                const response = await fetch(`/api/reading-groups/${groupId}/join`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    loadGroups();
                    showDetail(groupId);
                }
            } catch (error) {
                console.error('加入小组失败:', error);
            }
        }
        
        async function addNote(groupId) {
            const content = document.getElementById('noteInput').value;
            if (!content.trim()) return;
            
            try {
                const response = await fetch(`/api/reading-groups/${groupId}/notes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                const data = await response.json();
                
                if (data.success) {
                    showDetail(groupId);
                }
            } catch (error) {
                console.error('发布笔记失败:', error);
            }
        }
        
        async function likeNote(groupId, noteId) {
            loadGroups();
            showDetail(groupId);
        }
        
        function showCreateModal() {
            document.getElementById('createModal').classList.add('show');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }
        
        async function createGroup() {
            const bookTitle = document.getElementById('bookTitle').value;
            const desc = document.getElementById('groupDesc').value;
            
            if (!bookTitle.trim()) {
                alert('请输入书名');
                return;
            }
            
            loadGroups();
            closeModal('createModal');
        }
        
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('show');
                }
            });
        });
        
        loadGroups();
    </script>
</body>
</html>
